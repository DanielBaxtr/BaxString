<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bestillingsstatus | Stringr</title>
    <link rel="stylesheet" href="./styles.css?v=8" />
  </head>
  <body>
    <main class="container narrow">
      <section class="card">
        <h1>Bestillingsstatus</h1>
        <p id="status-message">Sjekker bookingstatus ...</p>
        <p class="vipps-note">Betaling: <strong>Vipps til 97908575</strong></p>
        <div id="status-details"></div>
        <p id="message-link-wrap" hidden>
          <a id="message-link" class="link-button" href="./messages.html">Åpne meldinger</a>
        </p>
        <a class="link-button" href="./booking.html">Tilbake til bestilling</a>
      </section>
    </main>

    <script>
      (async () => {
        const params = new URLSearchParams(window.location.search);
        const reference = params.get('reference');
        const messageEl = document.getElementById('status-message');
        const detailsEl = document.getElementById('status-details');
        const messageLinkWrap = document.getElementById('message-link-wrap');
        const messageLink = document.getElementById('message-link');

        if (!reference) {
          messageEl.textContent = 'Mangler bestillingsreferanse i URL.';
          return;
        }

        if (messageLinkWrap && messageLink) {
          messageLink.href = `./messages.html?reference=${encodeURIComponent(reference)}`;
          messageLinkWrap.hidden = false;
        }

        try {
          const response = await fetch(`/api/bookings/complete?reference=${encodeURIComponent(reference)}`);
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || 'Kunne ikke verifisere bestillingsstatus.');
          }

          if (data.paymentMode === 'manual' || data.status === 'awaiting_manual_payment') {
            const vippsNumber = data.manualVippsNumber || '97908575';
            messageEl.textContent = `Booking mottatt. Vipps NOK ${Number(data.amountNok).toFixed(2)} til ${vippsNumber} og merk betalingen med referanse ${data.reference}.`;
            messageEl.classList.add('status-ok');
          } else if (data.status === 'paid') {
            messageEl.textContent = 'Betaling bekreftet. Bestillingen din er registrert.';
            messageEl.classList.add('status-ok');
          } else if (data.status === 'authorized') {
            messageEl.textContent = 'Betaling autorisert. Vi bekrefter fullføring snart.';
          } else if (data.status === 'payment_failed') {
            messageEl.textContent = 'Betalingen ble ikke fullført. Prøv igjen.';
          } else {
            messageEl.textContent = 'Betaling er fortsatt under behandling. Oppdater siden om litt.';
          }

          detailsEl.innerHTML = `
            <ul>
              <li><strong>Referanse:</strong> ${data.reference}</li>
              <li><strong>Status:</strong> ${data.status}</li>
              <li><strong>Betalingsmåte:</strong> ${data.paymentMode || 'vipps'}</li>
              <li><strong>Vipps-status:</strong> ${data.vippsState || 'n/a'}</li>
              <li><strong>Beløp:</strong> NOK ${Number(data.amountNok).toFixed(2)}</li>
            </ul>
          `;
        } catch (error) {
          messageEl.textContent = error.message;
        }
      })();
    </script>
  </body>
</html>
