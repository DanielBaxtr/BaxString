<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logg inn | Stringr</title>
    <link rel="stylesheet" href="./auth.css?v=3" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-row">
        <a href="./index.html#hjem" class="logo">Stringr</a>

        <nav class="main-nav" aria-label="Hovedmeny">
          <a href="./index.html#hjem">Hjem</a>
          <a href="./index.html#om-oss">Om oss</a>
          <a href="./index.html#finn-stringer">Finn stringer</a>
          <a href="./index.html#kontakt">Kontakt</a>
        </nav>

        <div class="nav-actions">
          <a href="./login.html" class="login-link">Logg inn</a>
          <a href="./add-listing.html" class="add-listing-btn">+ Stringere! Legg til oppføring</a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="panel">
        <h1>Logg inn</h1>
        <p class="subtitle">Logg inn med e-post og passord.</p>

        <form id="login-form" class="auth-form" novalidate>
          <label>
            E-post
            <input id="login-email" type="email" placeholder="navn@epost.no" autocomplete="email" required />
          </label>

          <label>
            Passord
            <input
              id="login-password"
              type="password"
              placeholder="Skriv passord"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" class="primary-btn">Logg inn</button>
        </form>

        <p id="auth-message" class="status-message" aria-live="polite"></p>
        <p class="switch-link">
          Har du ikke bruker?
          <a id="to-register-link" href="./register.html" class="text-link">Registrer</a>
        </p>
      </section>
    </main>

    <p class="footer-simple">© 2026 Stringr</p>
    <script src="./auth.js?v=6"></script>
  </body>
</html>
